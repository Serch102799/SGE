<div class="login-container">
  <!-- Fondo Base Imagen (mezclado) -->
  <div class="bg-image"></div>
  
  <!-- Fondo animado Aurora -->
  <div class="animated-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Contenedor principal -->
  <div class="login-wrapper">
    <!-- Logo clickeable -->
    <div class="logo-container" [@logoState]="isFormVisible ? 'expanded' : 'collapsed'" (click)="toggleForm()"
      [class.active]="isFormVisible">
      <div class="logo">
        <img src="/assets/img/logo1.png" alt="Logo">
      </div>
      <p class="logo-text" *ngIf="!isFormVisible">¡BIENVENIDO!</p>
    </div>

    <!-- Formulario -->
    <div class="form-container" [@formState]="isFormVisible ? 'visible' : 'hidden'" *ngIf="isFormVisible">

      <h1 class="form-title">Iniciar Sesión</h1>

      <!-- Mensaje de error -->
      <div class="error-banner" *ngIf="errorMessage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Formulario -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
        <!-- Usuario -->
        <div class="form-group">
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="nombreUsuario" class="form-input" formControlName="nombreUsuario"
              placeholder=" " [class.error]="nombreUsuario?.invalid && nombreUsuario?.touched">
            <label for="nombreUsuario" class="form-label">Usuario</label>
          </div>
          <span class="error-text" *ngIf="nombreUsuario?.invalid && nombreUsuario?.touched">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            El usuario es requerido
          </span>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <div class="input-wrapper">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" class="form-input" formControlName="password"
              placeholder=" " [class.error]="password?.invalid && password?.touched">
            <label for="password" class="form-label">Contraseña</label>
          </div>
          <span class="error-text" *ngIf="password?.invalid && password?.touched">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            Mínimo 6 caracteres
          </span>
        </div>

        <!-- Recordarme -->
        <div class="form-group checkbox">
          <input type="checkbox" id="remember" class="form-checkbox" formControlName="remember">
          <label for="remember" class="checkbox-label">Mantener sesión iniciada</label>
        </div>

        <!-- Botón submit -->
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">Ingresar al Sistema</span>
          <span *ngIf="isLoading" class="loader">
            <svg viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="20" fill="none" stroke-width="3"></circle>
            </svg>
          </span>
        </button>
      </form>

      <!-- Botón para cerrar formulario -->
      <button class="btn-close" (click)="toggleForm()" type="button" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
</div>
