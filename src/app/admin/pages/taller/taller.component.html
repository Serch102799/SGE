<div class="usuarios-container mt-4">
  <div class="container-header d-flex justify-content-between align-items-center">
    <h2><i class="fas fa-tools"></i> Unidades en Taller</h2>
    <button class="btn-guardar" (click)="abrirModalIngreso()">
      <i class="fas fa-bus"></i> Registrar Ingreso
    </button>
  </div>

  <div class="container-body">
    <div class="taller-grid">
      <div class="card" *ngFor="let orden of ordenesEnTaller" 
           [ngClass]="{
             'border-pendiente': orden.estado === 'Pendiente',
             'border-reparacion': orden.estado === 'En Reparación',
             'border-refacciones': orden.estado === 'Esperando Refacciones'
           }">
        
        <div class="card-header d-flex justify-content-between">
          <h3 class="economico"><i class="fas fa-bus-alt"></i> {{ orden.economico }}</h3>
          <span class="badge" [ngClass]="orden.urgencia === 'Alta' ? 'badge-alta' : 'badge-normal'">
            {{ orden.urgencia }}
          </span>
        </div>

        <div class="card-body">
          <p class="text-muted mb-1"><small>Falla reportada:</small></p>
          <p class="falla-texto">{{ orden.falla_reportada }}</p>
          
          <div class="info-row mt-3">
            <div><i class="fas fa-wrench text-muted"></i> {{ orden.mecanico }}</div>
            <div><i class="far fa-clock text-muted"></i> {{ orden.fecha_ingreso | date:'dd/MM HH:mm' }}</div>
          </div>
        </div>

        <div class="card-footer text-center">
          <select class="form-control select-estado" [ngModel]="orden.estado" (ngModelChange)="cambiarEstado(orden, $event)"
                  [ngClass]="{
                    'text-warning': orden.estado === 'Pendiente',
                    'text-info': orden.estado === 'En Reparación',
                    'text-danger': orden.estado === 'Esperando Refacciones'
                  }">
            <option value="Pendiente">🟡 Pendiente</option>
            <option value="En Reparación">🔵 En Reparación</option>
            <option value="Esperando Refacciones">🔴 Esperando Refacciones</option>
            <option value="Terminado">🟢 Terminado (Liberar)</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="mostrarModalIngreso" (click)="cerrarModalIngreso()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3><i class="fas fa-clipboard-check"></i> Recepción de Unidad</h3>
      <button class="btn-cerrar" (click)="cerrarModalIngreso()">×</button>
    </div>
    
    <div class="modal-body">
      <div class="row">
        <div class="col-md-6 form-group">
          <label>Autobús (Económico)</label>
          <input type="text" class="form-control" placeholder="Buscar unidad...">
        </div>
        <div class="col-md-6 form-group">
          <label>Kilometraje Actual</label>
          <input type="number" class="form-control" placeholder="Ej. 150000">
        </div>
        <div class="col-md-6 form-group">
          <label>Tipo de Mantenimiento</label>
          <select class="form-control" [(ngModel)]="nuevaOrden.tipo_mantenimiento">
            <option value="Correctivo">Correctivo (Falla)</option>
            <option value="Preventivo">Preventivo (Servicio)</option>
            <option value="Rescate">Rescate (Tirado)</option>
          </select>
        </div>
        <div class="col-md-6 form-group">
          <label>Urgencia</label>
          <select class="form-control" [(ngModel)]="nuevaOrden.urgencia">
            <option value="Baja">Baja</option>
            <option value="Normal">Normal</option>
            <option value="Alta">Alta (Unidad Parada)</option>
          </select>
        </div>
        <div class="col-md-12 form-group">
          <label>Falla Reportada / Trabajo a realizar</label>
          <textarea class="form-control" rows="3" [(ngModel)]="nuevaOrden.falla_reportada" placeholder="Detalla el problema que reporta el operador..."></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancelar" (click)="cerrarModalIngreso()">Cancelar</button>
      <button class="btn-guardar"><i class="fas fa-save"></i> Ingresar al Taller</button>
    </div>
  </div>
</div>
